# the messages in this section can be customised for each rankup in rankups.yml.
rankup:
  # requirements-not-met: "&#F15151You need &#60B54E{{rank.requirement('money').total | money}} ₵&#F15151 or &#60B54Eother requirements&#F15151 to rankup."
  requirements-not-met: |-
    &#60B54ERequirements not met to rankup to &#ddac46{{next.rank}}&#60B54E:
    {% for req in rank.requirements %}
    {% if not req.done %}
    &#a9aba3 ☐ {% if req.total > 1 %}&#a9aba3{{ req.total| number  }}&#639f5b/&#a9aba3{{ req.progress| number  }}{% endif %} {{ requirementNames[req.name] | default(req.name) }}
    {% else %}
    &#639f5b ☑ {% if req.total > 1 %}&#a9aba3{{ req.total| number  }}&#639f5b/&#a9aba3{{ req.progress| number  }}{% endif %} {{ requirementNames[req.name] | default(req.name) }}
    {% endif %}
    
    {% endfor %}

  no-rankup: "&#ddac46You are at the highest rank."
  # set to an empty string, ie: success-public: ""
  # to hide that message.
  success-public: "&#60B54E&l{{player}} &#ddac46has ranked up to: &#60B54E{{next.rank}}"
  success-private: "&#ddac46You have ranked up to: &#60B54E{{next.rank}}"
  # used for the text confirmation
  confirmation: |-
    &#ddac46Are you sure you want to rankup to &#60B54E{{next.rank}}&#ddac46?
    &#ddac46Type &#60B54E/rankup &#ddac46again to confirm.
  must-prestige: "&#F15151You must prestige to /rankup further!"
  gui:
    rows: 1
    title: "Rankup to &l{{next.rank}}"
    rankup:
      material: EMERALD_BLOCK
      # index can be separated by spaces to show in multiple groups
      # for example: 0-3 9-12 18-21
      # you can also just use a single number instead of a range.
      index: 0-3
      name: "&#598C58&lConfirm"
      # lore is optional
      lore: "&#598C58Rankup to &b&l{{next.rank}}"
    cancel:
      material: REDSTONE_BLOCK
      index: 5-8
      name: "&#F15151&lCancel"
    fill:
      name: " "
      # if you are using a 1.8-1.12 and you want to change this
      # you can use MATERIAL:data, for example STAINED_GLASS_PANE:8
      # this works for both the rankup and cancel blocks as well
      material: BLACK_STAINED_GLASS_PANE

  ranksgui:
    title: "Ranks"
    rows: 3
    offset: 10
    width: 7
    complete:
      material: GREEN_STAINED_GLASS_PANE
      name: "&#598C58Rank &7&l{{next.rank}} &#598C58(completed)"
    current:
      material: ORANGE_STAINED_GLASS_PANE
      name: "&dRankup to &7&l{{next.rank}}"
    incomplete:
      material: RED_STAINED_GLASS_PANE
      name: "&#F15151Rank &7&l{{next.rank}} &#F15151(requires rankup)"
    fill:
      material: BLACK_STAINED_GLASS_PANE
      name: " "

  # you can (and probably should) you override these in rankups.yml
  # to show the specific requirements for each rank.
  # however if you are just using money or don't need to change the message per rank, you can use any combination of:
  # {{rank.requirement('money').total | simple}} {MONEY_NEEDED} {PERCENT_DONE <requirement>} {PERCENT_LEFT <requirement>} {AMOUNT <requirement>} {AMOUNT_NEEDED <requirement>}
  # {{rank.requirement('money').total | simple}} and {MONEY_NEEDED} are different from {AMOUNT money} and {AMOUNT_NEEDED money} in that they use a different format.
  # here is an example of showing the requirements for just money:
  #list:
  #  complete: "&7{{rank.rank}} &8\xbb &7&l{{next.rank}} &#ddac46for &7${{rank.requirement('money').total | simple}}"
  #  current: "&#F15151{{rank.rank}} &#ddac46\xbb &#F15151&l{{next.rank}} &#ddac46for &#598C58${{rank.requirement('money').total | simple}} &#ddac46{PERCENT_DONE money}%"
  #  incomplete: "&r{{rank.rank}} &#ddac46\xbb &r&l{{next.rank}} &#ddac46for &#598C58${{rank.requirement('money').total | simple}}"
  list:
    complete: "&8&m{{rank.rank}} &m\xbb &8&m&l{{next.rank}}"
    current: "&#598C58&l{{rank.rank}} &#ddac46&l\xbb &#598C58&l&l{{next.rank}}"
    incomplete: "&7{{rank.rank}} &#ddac46\xbb &7&l{{next.rank}}"
    # an empty string disables the header/footer
    header: "&#598C58&lRanks:"
    footer: ""
  # sent when a player tries to rankup when they are on cooldown
  cooldown:
    singular: "&#F15151You must wait {{seconds_left}} more second to rankup again."
    plural: "&#F15151You must wait {{seconds_left}} more seconds to rankup again."
# prestige messages can also be customised
prestige:
  requirements-not-met: "&#F15151You need {{rank.requirement('money').total | money}} ₵ to prestige."
  no-prestige: "&#ddac46You are at the highest prestige."

  success-public: "&#60B54E{{player}} &#ddac46has prestiged to: &d&l{{next.rank}}"
  success-private: "&#598C58You have prestiged to: &d&l{{next.rank}}"

  confirmation: |-
    &#ddac46Are you sure you want to prestige to &#60B54E{{next.rank}}&#ddac46?
    &#ddac46Type &#60B54E/prestige &#ddac46again to confirm.

  gui:
    title: "Prestige to &l{{next.rank}}"
    rankup:
      material: GOLD_BLOCK
      index: 0-3
      name: "&#598C58&lConfirm"
      lore: "&#598C58Prestige to &b&l{{next.rank}}"
    cancel:
      material: REDSTONE_BLOCK
      index: 5-8
      name: "&#F15151&lCancel"
    fill:
      name: " "
      # if you are using a 1.8-1.12 and you want to change this
      # you can use MATERIAL:data, for example STAINED_GLASS_PANE:8
      # this works for both the rankup and cancel blocks as well
      material: BLACK_STAINED_GLASS_PANE

  list:
    complete: "&m&7{{rank.rank}} &8\xbb &7&l{{next.rank}}"
    current: "&#60B54E{{rank.rank}} &#ddac46\xbb &#60B54E{{next.rank}}"
    incomplete: "&r{{rank.rank}} &#ddac46\xbb &r&l{{next.rank}}"
    header: ""
    footer: ""
  cooldown:
    singular: "&#F15151You must wait {{seconds_left}} second to prestige again."
    plural: "&#F15151You must wait {{seconds_left}} more seconds to prestige again."

not-high-enough: "&#F15151You cannot prestige at your rank!"
not-in-ladder: "&#F15151Sorry, but we could not find any rankups for the group(s) you are in. Use /ranks to list the rankups."


